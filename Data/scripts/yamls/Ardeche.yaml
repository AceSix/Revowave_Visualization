# config for Ardeche BDForet Labeled data

debug_mode: False

input:
  pkl_file: '../pkls/registered_D007.pkl'

processing:
  adaptive_threshold: 0
  # [W, E, S, N]
  geo_bounds: [3.8, 4.9, 44.2, 45.4]  # mapia seg
  clip_meters_above_rh98: 5
  apply_square_root: False  # apply sqrt before normalization

output:
  path: '../../Unity/GEDI_Visualization/Assets/Data/'
  base_filename: 'mapia_partial'
